name: ScriviCore CI

on:
  push:
    branches: [main]
    paths:
      - 'ScriviCore/**'
      - 'CMakeLists.txt'
      - '.github/workflows/scrivi-core-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'ScriviCore/**'
      - 'CMakeLists.txt'
      - '.github/workflows/scrivi-core-ci.yml'

jobs:
  build-and-test:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest]

    steps:
      - uses: actions/checkout@v4

      # OpenSSL 3 (libcrypto) backs the Linux EncryptedFileSecureStore
      # (SP-059 / AC4). Ubuntu runners ship it, but install explicitly so the
      # find_package(OpenSSL 3 REQUIRED) configure step is deterministic.
      - name: Install OpenSSL (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libssl-dev

      - name: Configure
        run: cmake -S . -B build -DSCRIVI_BUILD_TESTS=ON

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure
