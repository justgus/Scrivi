name: Scrivi Linux App CI

# Builds the Linux Qt/QML app (EP-020). Separate from ScriviCore CI so the core
# build stays Qt-free; this job installs Qt6 and links the ScriviCore target.
on:
  push:
    branches: [main]
    paths:
      - 'platforms/linux/**'
      - 'ScriviCore/**'
      - 'CMakeLists.txt'
      - '.github/workflows/scrivi-linux-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'platforms/linux/**'
      - 'ScriviCore/**'
      - 'CMakeLists.txt'
      - '.github/workflows/scrivi-linux-ci.yml'

jobs:
  build-linux-app:
    name: ubuntu-24.04 (Qt 6.4)
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      # Qt 6.4 + QML modules from apt — matches the Docker/alpha toolchain pin.
      - name: Install Qt6 + build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake ninja-build \
            libssl-dev \
            qt6-base-dev qt6-declarative-dev \
            qml6-module-qtquick qml6-module-qtquick-controls \
            qml6-module-qtquick-templates \
            qml6-module-qtquick-layouts qml6-module-qtquick-window \
            qml6-module-qtqml-workerscript qml6-module-qtqml-models \
            libgl1-mesa-dev

      - name: Configure
        run: cmake -S . -B build -G Ninja -DSCRIVI_BUILD_LINUX=ON -DSCRIVI_BUILD_TESTS=OFF

      - name: Build
        run: cmake --build build --parallel

      # Headless smoke: launch the app under Xvfb and confirm it starts a window
      # and stays up briefly (proves the QML engine + ScriviBridge load without
      # crashing). A non-zero exit or immediate quit fails the job.
      - name: Headless smoke test
        run: |
          sudo apt-get install -y --no-install-recommends xvfb
          xvfb-run -a --server-args="-screen 0 1024x768x24" \
            timeout --preserve-status 8 ./build/platforms/linux/scrivi_linux &
          APP=$!
          sleep 5
          if ! kill -0 "$APP" 2>/dev/null; then
            echo "App exited early — smoke test failed."
            wait "$APP"; exit 1
          fi
          echo "App is running under Xvfb — smoke test passed."
          kill "$APP" 2>/dev/null || true

      # Persistence smoke (SP-059 / T-0228): run the console harness twice against
      # one temp $XDG_DATA_HOME and assert identity (AC4) + recents (AC5) survive a
      # simulated restart. No display needed (Qt6::Core only).
      - name: Persistence smoke test
        run: |
          platforms/linux/tests/persistence_smoke.sh \
            ./build/platforms/linux/scrivi_linux_persistence_smoke

      # Full-loop lifecycle smoke (SP-060 / T-0233): create → open (ready) →
      # close → reopen-from-recent, and assert it survives a restart (AC3/AC7).
      - name: Lifecycle full-loop smoke test
        run: |
          platforms/linux/tests/lifecycle_smoke.sh \
            ./build/platforms/linux/scrivi_linux_lifecycle_smoke

      # Scene-load smoke (SP-061 / T-0237, EP-022 AC1/AC2): build a 3-scene
      # fixture and assert the editor's continuous-viewport assembly loads every
      # body at its recorded offset (open_project + open_scene loop +
      # SceneDocument). Uses the Qt offscreen platform (set inside the script).
      - name: Scene-load smoke test
        run: |
          platforms/linux/tests/scene_load_smoke.sh \
            ./build/platforms/linux/scrivi_linux_scene_load_smoke

      # Editable-map smoke (SP-062 / T-0238): pure SceneDocument logic — assert the
      # boundary classification (editable body vs. protected heading/separator) and
      # the offset-map maintenance on insert + delete that keep edits inside their
      # owning scene. Offscreen platform (set inside the script).
      - name: Editable-map smoke test
        run: |
          platforms/linux/tests/editor_map_smoke.sh \
            ./build/platforms/linux/scrivi_linux_editor_map_smoke

      # Per-scene save smoke (SP-062 / T-0239, EP-022 AC3): create → open →
      # saveScene(new body) → reopen asserts the new bytes are on disk, proving the
      # editor's auto-save path (ScriviBridge::saveScene → scrivi_save_scene) writes
      # the real .md. No display needed.
      - name: Scene-save smoke test
        run: |
          platforms/linux/tests/scene_save_smoke.sh \
            ./build/platforms/linux/scrivi_linux_scene_save_smoke

      # In-editor create smoke (SP-062 / T-0240 + T-0241, EP-022 AC3): createScene
      # after the active scene (persists in order) and createChapter at the end
      # (persists last, in a new chapter), each spliced into the offset map via
      # insertSceneAfter. Offscreen platform (set inside the script).
      - name: Scene-create smoke test
        run: |
          platforms/linux/tests/scene_create_smoke.sh \
            ./build/platforms/linux/scrivi_linux_scene_create_smoke

      # In-navigator delete smoke (SP-065 / T-0253, EP-023 AC1/AC2): build a
      # 4-scene/2-chapter fixture, splice scenes/chapters out of a SceneDocument via
      # removeScene / removeChapter (asserting the offset map stays well-formed), then
      # delete via bridge.deleteScene / deleteChapter and assert the removals persist
      # on reopen. Offscreen platform (set inside the script).
      - name: Scene-delete smoke test
        run: |
          platforms/linux/tests/scene_delete_smoke.sh \
            ./build/platforms/linux/scrivi_linux_scene_delete_smoke

      # In-navigator rename smoke (SP-066 / T-0257, EP-023 AC3): build a 2-chapter
      # fixture, rename a scene + a chapter via bridge.renameScene / renameChapter
      # (asserting the sidecar title round-trips on reopen, incl. blank→cleared), and
      # apply the label/heading update to a SceneDocument (setChapterTitle rewrites the
      # live heading in place, offset map well-formed). Offscreen platform.
      - name: Scene-rename smoke test
        run: |
          platforms/linux/tests/scene_rename_smoke.sh \
            ./build/platforms/linux/scrivi_linux_scene_rename_smoke

      # Scene/chapter reorder smoke (SP-067 / T-0263, EP-023 AC4 + I-0063/I-0064):
      # build a 5-scene/2-chapter fixture, splice scenes within + across chapters via
      # SceneDocument::moveScene (offset map well-formed, chapter-first re-promotion),
      # persist a cross-chapter reorder via ScriviBridge::reorderScene (assert order on
      # reopen), replay the I-0064 chapter-split orchestration (end-of-scene + mid-scene)
      # and renumber created "Chapter N" chapters (I-0063). Offscreen platform.
      - name: Scene-reorder smoke test
        run: |
          platforms/linux/tests/scene_reorder_smoke.sh \
            ./build/platforms/linux/scrivi_linux_scene_reorder_smoke

      # Chapter-reorder smoke (SP-073 / T-0296, EP-023 AC5): build a 4-scene/3-chapter
      # fixture, move whole chapters as blocks via SceneDocument::moveChapter (map
      # well-formed, bodies + member order preserved, no-op landings refused), persist
      # moves via ScriviBridge::reorderChapter (assert order + bodies on reopen), and
      # prove the stale-path refresh: the reorder reslugs the chapter folder, the
      # envelope reports the new metadataPath, and a save through the refreshed paths
      # lands (I-0074/I-0079 class). Offscreen platform.
      - name: Chapter-reorder smoke test
        run: |
          platforms/linux/tests/chapter_reorder_smoke.sh \
            ./build/platforms/linux/scrivi_linux_chapter_reorder_smoke

      # Quit-path smoke (SP-062 regression guard): the shell flip broke the landing
      # Quit button (a QQuickWidget engine doesn't auto-wire QQmlEngine::quit()).
      # Assert the connection main.cpp adds drives the app to exit. Offscreen.
      - name: Quit-path smoke test
        run: |
          platforms/linux/tests/quit_smoke.sh \
            ./build/platforms/linux/scrivi_linux_quit_smoke
